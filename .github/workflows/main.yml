name: Vigilante-Pro-30s
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Permiso para guardar la memoria
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - run: pip install requests

      - name: Ejecutar Bot
        run: python bot.py

      - name: Guardar Memoria
        run: |
          git config --global user.name "CazadorBot"
          git config --global user.email "bot@juegos.com"
          git pull origin main --rebase # Sincroniza para evitar errores
          git add enviados.txt || true
          git commit -m "Actualizar juegos enviados" || exit 0
          git push origin main
